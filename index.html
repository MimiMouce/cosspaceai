                )}
              </div>

              <div style={S.card}>
                <div style={S.lbl}>{L.wfTitle}</div>
                {WORKFLOWS.map((wf, i) => (
                  <div key={i} style={{ marginBottom:8 }}>
                    <button onClick={() => setAwf(awf===i?null:i)} style={{ width:"100%", background:"#06040f", border:`1px solid ${awf===i?"#7c3aed":"#1a1535"}`, borderRadius:10, padding:12, textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{wf.title}</div>
                        <div style={{ fontSize:11, color:"#4b5563", marginTop:2 }}>{wf.tool} · {wf.time}</div>
                      </div>
                      <span style={{ color:"#7c3aed", transform:`rotate(${awf===i?180:0}deg)`, transition:"transform 0.2s", display:"inline-block" }}>▾</span>
                    </button>
                    {awf===i && (
                      <div style={{ background:"#06040f", border:"1px solid #7c3aed44", borderRadius:"0 0 10px 10px", padding:12, marginTop:-1, borderTop:"none" }}>
                        {wf.steps.map((s, si) => (
                          <div key={si} style={{ display:"flex", gap:9, marginBottom:8 }}>
                            <div style={{ width:22, height:22, borderRadius:6, background:"linear-gradient(135deg,#7c3aed,#06b6d4)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff", flexShrink:0 }}>{si+1}</div>
                            <div style={{ fontSize:12, color:"#c4b8ff", lineHeight:1.5 }}>{s}</div>
                          </div>
                        ))}
                        <button onClick={() => { setTab("mimi"); setInp("Help me with: " + wf.title); }} style={{ ...S.btn, width:"100%", padding:9, fontSize:12, marginTop:4 }}>{L.wfBtn}</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div style={S.card}>
                <div style={S.lbl}>{L.knTitle}</div>
                <div style={{ display:"grid", gridTemplateColumns: isD?"1fr 1fr 1fr":"1fr 1fr", gap:7 }}>
                  {["AI Influencer Building","Higgsfield Mastery","Kling Motion Control","Fanvue Monetization","Instagram Growth","TikTok Algorithms","Prompt Engineering","UGC Career"].map(t => (
                    <button key={t} onClick={() => { setTab("mimi"); setInp("Teach me about: " + t); }} style={{ background:"#06040f", border:"1px solid #1a1535", borderRadius:8, padding:"8px 10px", color:"#8b7fb8", fontSize:11, cursor:"pointer", textAlign:"left" }}>{t}</button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {tab === "network" && (
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div>
                <div style={{ fontSize: isD?22:18, fontWeight:800, color:"#fff" }}>🌐 {L.netTitle}</div>
                <div style={{ fontSize:12, color:"#6b7280", marginTop:3 }}>{L.netSub}</div>
              </div>

              <div style={{ ...S.card, background:"linear-gradient(135deg,#1a0f3e,#0d0b1e)", border:"1px solid #2d1f6e" }}>
                <div style={{ display:"flex", gap:12 }}>
                  <span style={{ fontSize:24, flexShrink:0 }}>💜</span>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:4 }}>Mimi — Opportunity Finder</div>
                    <div style={{ fontSize:12, color:"#8b7fb8", lineHeight:1.5, fontStyle:"italic" }}>"I analyzed your profile. You are suitable for UGC campaigns, Instagram brands and AI model ads. Here are 4 active opportunities."</div>
                    <button style={{ ...S.btn, padding:"8px 14px", fontSize:12, marginTop:10 }} onClick={() => { setTab("mimi"); setInp("What are the best opportunities for me right now?"); }}>See full analysis</button>
                  </div>
                </div>
              </div>

              <div style={S.g2}>
                {OPPS.map((o, i) => (
                  <div key={i} style={S.card}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <span style={{ fontSize:10, fontWeight:700, color:"#7c3aed", background:"#7c3aed22", borderRadius:6, padding:"2px 8px" }}>{o.type}</span>
                      <span style={{ fontSize:10, fontWeight:700, color: o.hot?"#f59e0b":"#22c55e", background: o.hot?"#78350f33":"#052e16", borderRadius:6, padding:"2px 8px" }}>{o.hot?"🔥 Hot":"✓ Open"}</span>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:3 }}>{o.brand}</div>
                    <div style={{ fontSize:11, color:"#8b7fb8", marginBottom:10 }}>{o.task}</div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:15, fontWeight:800, color:"#a78bfa" }}>{o.budget}</span>
                      <button style={{ ...S.btn, padding:"6px 12px", fontSize:11 }}>{L.apply}</button>
                    </div>
                  </div>
                ))}
              </div>

              <div style={S.card}>
                <div style={S.lbl}>{L.coming}</div>
                <div style={S.g3}>
                  {[["🏆","Creator Portfolio","Auto-builds from your work"],["🔍","Brand Discovery","Brands find you"],["📜","Certificate","Verified creator credentials"]].map(([icon,title,desc]) => (
                    <div key={title} style={{ background:"#06040f", borderRadius:10, padding:12, border:"1px dashed #1a1535", opacity:0.7 }}>
                      <div style={{ fontSize:20, marginBottom:6 }}>{icon}</div>
                      <div style={{ fontSize:12, fontWeight:600, color:"#6b7280" }}>{title}</div>
                      <div style={{ fontSize:11, color:"#374151", marginTop:2 }}>{desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {tab === "academy" && (
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <div>
                <div style={{ fontSize: isD?22:18, fontWeight:800, color:"#fff" }}>🏆 {L.acTitle}</div>
                <div style={{ fontSize:12, color:"#6b7280", marginTop:3 }}>{L.acSub}</div>
              </div>
              {[
                { lvl:1, title:"Beginner", desc:"AI tools & platform basics", done:true },
                { lvl:2, title:"AI Creator", desc:"Creating AI content & models", done:false },
                { lvl:3, title:"Content Creator", desc:"Strategy, algorithms, audience", done:false },
                { lvl:4, title:"AI Model Builder", desc:"Building complete AI personality", done:false },
                { lvl:5, title:"Monetization Expert", desc:"Revenue, partnerships, scaling", done:false },
              ].map(lvl => (
                <div key={lvl.lvl} style={{ ...S.card, background: lvl.done?"linear-gradient(135deg,#1a0f3e,#0d0b1e)":"#0d0b1e", border:`1px solid ${lvl.done?"#7c3aed55":"#1a1535"}` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:42, height:42, borderRadius:10, background: lvl.done?"linear-gradient(135deg,#7c3aed,#06b6d4)":"#1a1535", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:800, color: lvl.done?"#fff":"#374151", flexShrink:0 }}>{lvl.lvl}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:14, color: lvl.done?"#fff":"#374151" }}>Level {lvl.lvl} — {lvl.title}</div>
                      <div style={{ fontSize:11, color: lvl.done?"#8b7fb8":"#2d2d2d", marginTop:2 }}>{lvl.desc}</div>
                      <div style={{ height:3, background:"#1a1535", borderRadius:2, marginTop:8 }}>
                        <div style={{ height:"100%", width: lvl.done?"100%":"0%", background:"linear-gradient(90deg,#7c3aed,#06b6d4)", borderRadius:2, transition:"width 1s" }}/>
                      </div>
                    </div>
                    <div style={{ fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:8, background: lvl.done?"#052e16":"#1a1535", color: lvl.done?"#4ade80":"#374151", border: lvl.done?"1px solid #16a34a33":"none", flexShrink:0 }}>
                      {lvl.done?"✓ Done":"Locked"}
                    </div>
                  </div>
                </div>
              ))}
              <button style={{ ...S.btn, width:"100%", padding:12, fontSize:13 }} onClick={() => setTab("mimi")}>{L.acBtn}</button>
            </div>
          )}

        </div>
      </div>

      {!isD && (
        <div style={S.bnav}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, background:"transparent", border:"none", cursor:"pointer", padding:"3px 8px", opacity: tab===t.id?1:0.35, minWidth:50 }}>
              <span style={{ fontSize: t.id==="mimi"?19:15 }}>{t.icon}</span>
              <span style={{ fontSize:9, fontWeight: tab===t.id?700:400, color: tab===t.id?"#a78bfa":"#6b7280" }}>{t.label}</span>
            </button>
          ))}
        </div>
      )}

      <style>{`
        @keyframes pulse{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1);opacity:1}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:#2d1f6e;border-radius:2px}
        input,button{-webkit-appearance:none}
      `}</style>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
